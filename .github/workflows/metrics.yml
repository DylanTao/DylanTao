name: Profile metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 0"

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: DylanTao
          filename: github-metrics.svg

          # Personal repositories only, including private repositories
          # accessible to METRICS_TOKEN. Autodesk organization work is kept
          # separate and will use its own workflow and secret.
          repositories: 100
          repositories_affiliations: owner
          repositories_forks: no

          # Show aggregate totals and history without publishing private
          # repository names on the public profile.
          base: repositories
          plugin_lines: yes
          plugin_lines_sections: base,history
          plugin_lines_history_limit: 5
          plugin_lines_delay: 30
